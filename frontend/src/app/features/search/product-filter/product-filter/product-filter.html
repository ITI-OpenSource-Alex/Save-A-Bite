<div class="w-full p-5 space-y-8 bg-white border border-gray-100 shadow-sm rounded-xl">
  
  <div>
    <h3 class="mb-4 text-lg font-bold text-gray-800">Categories</h3>
    <ul class="space-y-3 text-sm text-gray-600">
      
      @for (cat of categories; track cat.name) {
        <li (click)="selectCategory(cat.name)"
            [ngClass]="{'text-orange-500 font-semibold': filters.category === cat.name}"
            class="flex items-center justify-between transition-colors cursor-pointer hover:text-orange-500">
          <span>{{ cat.name }}</span>
          <span class="px-3 py-1 text-xs text-gray-400 border border-gray-100 rounded-full bg-gray-50">
            {{ cat.count }}
          </span>
        </li>
      }

    </ul>
    
    @if (filters.category) {
      <button (click)="selectCategory(undefined)" 
              type="button"
              class="mt-3 text-xs text-red-500 hover:underline">
        Clear Category
      </button>
    }
  </div>

  <hr class="border-gray-100">

  <div>
    <h3 class="mb-4 text-sm font-bold tracking-wider text-gray-800 uppercase">Price Range (EGP)</h3>
    <div class="flex items-center gap-2">
      <input type="number" [(ngModel)]="filters.minPrice" aria-label="Minimum Price" placeholder="Min" 
             class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:border-orange-500">
      <span class="text-gray-400">-</span>
      <input type="number" [(ngModel)]="filters.maxPrice" aria-label="Maximum Price" placeholder="Max" 
             class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:border-orange-500">
    </div>
    <button (click)="applyFilters()" 
            type="button"
            class="w-full mt-3 py-2 text-sm font-semibold text-white transition-colors bg-gray-900 rounded-lg hover:bg-orange-500">
      Apply Price
    </button>
  </div>

  <hr class="border-gray-100">


</div>
