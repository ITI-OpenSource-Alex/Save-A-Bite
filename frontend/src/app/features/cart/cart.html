<div class="min-h-screen bg-gradient-to-br from-green-50 via-white to-green-50">
  <div class="max-w-7xl mx-auto px-6 py-8">
    <div class="flex items-center justify-between gap-3 mb-8">
      <h1 class="text-3xl font-bold">Your Cart</h1>

      <a
        href="/browse"
        class="text-green-600 hover:text-green-700 font-semibold flex items-center gap-2 transition-colors px-4 py-2 bg-green-50 hover:bg-green-100 rounded-lg"
      >
        ← Continue Shopping
      </a>
    </div>

    @if (isLoading()) {
      <div class="flex items-center justify-center h-64">
        <div class="w-10 h-10 border-b-2 border-green-500 rounded-full animate-spin"></div>
      </div>
    } @else {
      <div class="flex flex-col lg:flex-row gap-6 items-start">
        <!-- CART ITEMS -->
        <div class="w-full max-w-md mx-auto lg:max-w-none lg:flex-1 flex flex-col gap-4">
          <app-cart-items [items]="cart()?.items || []" (cartUpdated)="onCartUpdated($event)">
          </app-cart-items>
        </div>

        <!-- ORDER SUMMARY (always visible) -->
        @if (cart()) {
          <app-order-summary
            [cart]="cart()!"
            [deliveryFee]="deliveryFee"
            (cartUpdated)="onCartUpdated($event)"
          >
          </app-order-summary>
        }
      </div>
    }
  </div>
</div>
