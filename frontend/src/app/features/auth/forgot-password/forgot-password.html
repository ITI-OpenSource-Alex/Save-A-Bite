<div class="relative min-h-screen bg-linear-to-br from-green-50 via-white to-emerald-50 flex items-center justify-center p-6 overflow-hidden">
  
  <!-- Decorative Background Blobs -->
  <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-green-200/30 rounded-full blur-3xl animate-float"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-emerald-200/30 rounded-full blur-3xl animate-float" style="animation-delay: -3s"></div>

  <div class="w-full max-w-[440px] relative z-10">
    <!-- Card -->
    <div class="premium-glass rounded-[32px] overflow-hidden">
      <!-- Header Banner -->
      <div class="bg-linear-to-r from-green-600 to-emerald-500 px-8 py-10 text-center relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
          <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none">
            <path d="M0,0 L100,0 L100,100 L0,100 Z" fill="url(#grid)"></path>
            <defs>
              <pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse">
                <path d="M 10 0 L 0 0 0 10" fill="none" stroke="white" stroke-width="0.5"/>
              </pattern>
            </defs>
          </svg>
        </div>
        
        <div class="inline-flex items-center justify-center w-14 h-14 bg-white/20 backdrop-blur-md rounded-2xl mb-4 shadow-inner">
          <span class="text-3xl">🔑</span>
        </div>
        <h1 class="text-2xl font-black text-white tracking-tight mb-2">
          Forgot Password
        </h1>
        <p class="text-green-50/80 text-xs font-medium px-4">
          {{ step === 1 ? 'Enter your email to receive an OTP code.' : 'Enter the OTP sent to your email and your new password.' }}
        </p>
      </div>

      <!-- Form Content -->
      <div class="px-10 py-8 bg-white/40">
        <!-- Error Alert -->
        <div *ngIf="error" class="mb-6 flex items-center gap-3 bg-red-500/10 border border-red-200/50 text-red-700 text-xs font-semibold px-5 py-3.5 rounded-2xl animate-in fade-in slide-in-from-top-2">
          <i class="fa-solid fa-circle-exclamation text-red-500 shrink-0 text-sm"></i>
          <span>{{ error }}</span>
        </div>

        <!-- Success Alert -->
        <div *ngIf="successMessage" class="mb-6 flex items-center gap-3 bg-green-500/10 border border-green-200/50 text-green-700 text-xs font-semibold px-5 py-3.5 rounded-2xl animate-in fade-in slide-in-from-top-2">
          <i class="fa-solid fa-circle-check text-green-500 shrink-0 text-sm"></i>
          <span>{{ successMessage }}</span>
        </div>

        <!-- Step 1: Request OTP -->
        <div *ngIf="step === 1" class="space-y-5 animate-in fade-in zoom-in-95 duration-300">
          <div class="group">
            <label class="premium-label">Email Address</label>
            <div class="relative">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-green-600 transition-colors">
                <i class="fa-regular fa-envelope text-lg"></i>
              </span>
              <input
                type="email"
                placeholder=" "
                [(ngModel)]="email"
                class="premium-input"
              />
            </div>
          </div>

          <div class="mt-8">
            <button type="button" (click)="requestOtp()" [disabled]="loading" class="premium-button flex items-center justify-center gap-3">
              <svg *ngIf="loading" class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              <span>{{ loading ? 'Sending...' : 'Send Reset OTP' }}</span>
            </button>
          </div>
        </div>

        <!-- Step 2: Verify OTP -->
        <div *ngIf="step === 2" class="space-y-5 animate-in fade-in slide-in-from-right-4 duration-300">
          
          <div class="group">
            <label class="premium-label text-center block mb-4">6-Digit OTP Code</label>
            <div class="flex justify-center gap-2 sm:gap-3">
              @for (idx of otpIndices; track idx) {
                <input
                  type="text"
                  maxlength="1"
                  [id]="'otp-' + idx"
                  [(ngModel)]="otpArray[idx]"
                  (input)="onOtpInput($event, idx)"
                  (keydown)="onOtpKeydown($event, idx)"
                  (paste)="onOtpPaste($event)"
                  class="w-10 h-12 sm:w-12 sm:h-14 text-center text-xl font-bold rounded-xl border-2 border-green-100 focus:border-green-500 focus:ring-4 focus:ring-green-500/20 outline-none transition-all bg-white/50 text-green-700 shadow-inner"
                />
              }
            </div>
          </div>

          <div class="mt-8">
            <button type="button" (click)="verifyOtp()" [disabled]="loading" class="premium-button flex items-center justify-center gap-3">
              <svg *ngIf="loading" class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              <span>{{ loading ? 'Verifying...' : 'Verify OTP' }}</span>
            </button>
          </div>

          <div class="mt-6 text-center">
            <button type="button" (click)="goBack()" class="text-xs text-gray-500 hover:text-green-600 font-bold transition-colors">
              <i class="fa-solid fa-arrow-left mr-1"></i> Back to Email Input
            </button>
          </div>
        </div>

        <!-- Step 3: Reset Password -->
        <div *ngIf="step === 3" class="space-y-5 animate-in fade-in slide-in-from-right-4 duration-300">
          <div class="group">
            <label class="premium-label">New Password</label>
            <div class="relative">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-green-600 transition-colors">
                <i class="fa-solid fa-lock text-lg"></i>
              </span>
              <input
                type="password"
                placeholder=" "
                [(ngModel)]="newPassword"
                class="premium-input"
              />
            </div>
          </div>

          <div class="group">
            <label class="premium-label">Confirm New Password</label>
            <div class="relative">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-green-600 transition-colors">
                <i class="fa-solid fa-shield-check text-lg"></i>
              </span>
              <input
                type="password"
                placeholder=" "
                [(ngModel)]="confirmPassword"
                class="premium-input"
              />
            </div>
          </div>

          <div class="mt-8">
            <button type="button" (click)="resetPassword()" [disabled]="loading" class="premium-button flex items-center justify-center gap-3">
              <svg *ngIf="loading" class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              <span>{{ loading ? 'Resetting...' : 'Reset Password' }}</span>
            </button>
          </div>
        </div>

        <!-- Bottom Link -->
        <p class="text-center text-sm text-gray-500 mt-10">
          Remember your password?
          <a routerLink="/login" class="text-green-600 hover:text-green-700 font-black decoration-2 hover:underline transition-all">Sign In</a>
        </p>
      </div>
    </div>
  </div>
</div>
