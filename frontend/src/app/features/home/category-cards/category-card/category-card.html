<a
  [routerLink]="['/', category()._id]"
  routerLinkActive="border-green-700 ring-2 ring-green-600 shadow-sm"
  class="group w-full h-full flex min-w-35 flex-col items-center justify-center rounded-2xl border border-gray-200 bg-white p-6 text-center transition-all duration-200 ease-in-out hover:border-green-300 hover:bg-gray-100 shadow-sm hover:shadow-md"
>
  <div
    class="mb-3 flex h-10 w-10 items-center justify-center text-4xl transition-transform duration-300 ease-in-out group-hover:scale-125"
  >
    {{ category().icon }}
  </div>

  <h3 class="mb-1 text-sm font-semibold text-gray-900">
    {{ category().name }}
  </h3>

  <p class="text-xs text-gray-500">{{ category().offers }} offers</p>
</a>
