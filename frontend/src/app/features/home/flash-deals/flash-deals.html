<section id="flash-deals" class="py-16 bg-muted/30">
  <div class="container mx-auto px-6">
    <div class="mb-10 text-center">
      <h2 class="text-3xl font-bold flex items-center justify-center gap-2">⚡ Flash Deals</h2>

      <p class="text-muted-foreground">Only Few Left — grab them fast!</p>
    </div>

    <div class="grid gap-6 md:grid-cols-2 lg:grid-cols-4 mx-5">
      @for (deal of deals$ | async; track deal._id) {
        <app-product-card [product]="deal"></app-product-card>
      } @empty {
        <p class="text-center col-span-full text-muted-foreground">Loading deals...</p>
      }
    </div>
  </div>
</section>
