<section class="py-16 bg-muted/30 px-20">
  <div class="container mx-auto px-6">
    <div class="flex items-center justify-between mb-7">
      <h2 class="text-3xl font-semibold">Products of Same Category</h2>
      <a href="#" class="text-emerald-600 font-medium hover:bg-emerald-100 px-5 py-2 rounded-full">
        View All →
      </a>
    </div>
    <!-- cards -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      @for (store of stores; track store.name) {
        <div
          class="bg-white rounded-xl shadow-sm overflow-hidden hover:shadow-md transition cursor-pointer hover:-translate-y-2 duration-300"
        >
          <img [src]="store.image" alt="" class="w-full object-cover h-25" />
          <div class="p-5">
            <h3 class="text-lg font-semibold">
              {{ store.name }}
            </h3>

            <p class="text-sm text-gray-500 mt-1">
              {{ store.description }}
            </p>
            <div class="flex items-center justify-between mt-4 text-sm">
              <div class="flex items-center gap-1">
                ⭐
                <span class="font-medium">{{ store.rating }}</span>
              </div>

              <!-- <div class="text-gray-500">📍 {{ store.distance }} km</div> -->
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
