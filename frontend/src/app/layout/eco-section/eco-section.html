<section class="py-12">
  <div class="container mx-auto px-6">
    <div class="rounded-3xl bg-[#ecfdf5]/80 px-6 py-12 md:px-12 md:py-16">
      <div class="mb-10 text-center">
        <h2
          class="flex items-center justify-center gap-2 text-2xl font-bold text-gray-900 md:text-3xl"
        >
          🌍 Our Eco Impact
        </h2>
        <p class="mt-3 text-sm text-gray-600 md:text-base">
          Together, we're making a real difference
        </p>
      </div>

      <div class="grid grid-cols-1 gap-6 md:grid-cols-3">
        @for (stat of ecoStats; track stat.label) {
          <app-eco-card [stat]="stat" />
        }
      </div>
    </div>
  </div>
</section>
