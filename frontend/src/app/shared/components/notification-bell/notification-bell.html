<div class="fixed bottom-6 right-6 z-[9999] bg-white p-3 rounded-full shadow-2xl inline-block border border-gray-100">

  <div class="cursor-pointer flex items-center justify-center p-2 relative" (click)="toggleDropdown()">
    <i class="fa-solid fa-bell text-xl text-gray-600 hover:text-green-600 transition-colors"></i>
    
    @if (unreadCount > 0) {
      <span class="absolute top-0 right-0 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full animate-bounce shadow-sm">
        {{ unreadCount }}
      </span>
    }
  </div>

  @if (isOpen) {
    <div class="absolute right-0 bottom-full mb-4 w-80 bg-white rounded-lg shadow-xl border border-gray-100 z-50 overflow-hidden">
      
      <div class="p-3 border-b border-gray-100 flex justify-between items-center bg-gray-50">
        <h3 class="font-bold text-gray-800">Notifications</h3>
        <span class="text-xs text-gray-500">{{ notifications.length }} total</span>
      </div>
      
      <div class="max-h-96 overflow-y-auto">
        @if (notifications.length === 0) {
          <div class="p-6 text-center text-gray-500 text-sm">
            <i class="fa-regular fa-bell-slash text-2xl mb-2 text-gray-300"></i>
            <p>No new notifications</p>
          </div>
        } @else {
          @for (notif of notifications; track $index) {
            <div [ngClass]="{'bg-blue-50/50': !notif.isRead}" class="p-4 border-b border-gray-50 hover:bg-gray-50 transition-colors flex gap-3 items-start cursor-default">
              
              <div class="text-green-500 mt-0.5">
                <i class="fa-solid fa-tags" *ngIf="notif.resource === 'promocode'"></i>
                <i class="fa-solid fa-bag-shopping" *ngIf="notif.resource === 'order'"></i>
                <i class="fa-solid fa-bell" *ngIf="notif.resource !== 'promocode' && notif.resource !== 'order'"></i>
              </div>
              
              <div>
                <p class="text-sm text-gray-800">{{ notif.message }}</p>
                <p class="text-[10px] text-gray-400 mt-1" *ngIf="notif.createdAt">
                  {{ notif.createdAt | date:'short' }}
                </p>
              </div>
            </div>
          }
        }
      </div>
    </div>
  }
</div>
